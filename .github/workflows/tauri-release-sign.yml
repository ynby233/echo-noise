          test -f mobile/android/app/src/main/assets/data/noise.db
          test -f mobile/android/app/src/main/assets/public/index.html
          APK_CANDIDATE="${APK_PATH:-$(find mobile/android/app/build/outputs/apk/release -name '*.apk' | head -n1)}"

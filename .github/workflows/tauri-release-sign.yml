name: tauri-build-release-signed
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., V2.3.5)'
        required: true
        type: string
      draft:
        description: 'Create draft release'
        required: false
        type: boolean
        default: true
  push:
    tags:
      - '*'
permissions:
  contents: write
env:
  RELEASE_TAG: ${{ inputs.tag_name != '' && inputs.tag_name || github.ref_name }}
  DRAFT_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || true }}

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Normalize release tag
        shell: bash
        run: |
          RAW="${{ inputs.tag_name != '' && inputs.tag_name || github.ref_name }}"
          RAW="$(echo "$RAW" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          VER="$(echo "$RAW" | sed -E 's/^[vV][[:space:]]*//; s/^[[:space:]]+|[[:space:]]+$//g')"
          if [ -z "$VER" ]; then
            echo "ERROR: invalid release tag: '$RAW'"
            exit 1
          fi
          echo "RELEASE_TAG=V$VER" >> "$GITHUB_ENV"
      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ env.DRAFT_RELEASE }}
          tag_name: ${{ env.RELEASE_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-matrix:
    needs: create_release
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Normalize release tag
        shell: bash
        run: |
          RAW="${{ inputs.tag_name != '' && inputs.tag_name || github.ref_name }}"
          RAW="$(echo "$RAW" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          VER="$(echo "$RAW" | sed -E 's/^[vV][[:space:]]*//; s/^[[:space:]]+|[[:space:]]+$//g')"
          if [ -z "$VER" ]; then
            echo "ERROR: invalid release tag: '$RAW'"
            exit 1
          fi
          echo "RELEASE_TAG=V$VER" >> "$GITHUB_ENV"
      - name: Check desktop directory exists
        shell: bash
        id: chkdesk
        run: |
          if [ -d "desktop/tauri" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set app version from input tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag_name }}
          REF_TAG: ${{ github.ref_name }}
          SIGNING_IDENTITY: ${{ secrets.MAC_SIGNING_IDENTITY }}
        run: |
          node <<'NODE'
          const fs = require('fs')
          const p = require('path')
          const tag = (process.env.INPUT_TAG || process.env.REF_TAG || '')
          const raw = tag.trim().replace(/^[vV\s]+/, '').trim()
          const toSemver = (v) => {
            const m = v.match(/^(\d+)(?:\.(\d+))?(?:\.(\d+))?(?:[-+].*)?$/)
            if (!m) return '0.0.0'
            const major = m[1]
            const minor = m[2] || '0'
            const patch = m[3] || '0'
            return `${major}.${minor}.${patch}`
          }
          const ver = toSemver(raw)
          const id = process.env.SIGNING_IDENTITY || null
          const sdir = p.join('desktop', 'tauri', 'src-tauri')
          const conf = p.join(sdir, 'tauri.conf.json')

          fs.mkdirSync(sdir, { recursive: true })
          let obj
          if (fs.existsSync(conf)) {
            try {
              obj = JSON.parse(fs.readFileSync(conf, 'utf8'))
            } catch {
              obj = null
            }
          }
          if (!obj) {
            obj = {
              $schema: 'https://schema.tauri.app/config/2',
              productName: '说说笔记',
              version: ver || '0.0.0',
              identifier: 'cn.noisework.saynote',
              build: { devUrl: 'http://localhost:1314', frontendDist: '../dist' },
              app: { windows: [{ title: '说说笔记', width: 1280, height: 800 }] },
              bundle: {
                active: true,
                targets: ['dmg', 'nsis'],
                icon: ['icons/icon.ico', 'icons/icon-128.png', 'icons/icon-256.png', 'icons/icon-512.png'],
                resources: ['icons/favicon.svg', 'public', 'data/noise.db', 'config'],
                externalBin: ['bin/server', 'bin/ffmpeg'],
                windows: { nsis: {} },
                macOS: { hardenedRuntime: !!id, minimumSystemVersion: '10.13', signingIdentity: id }
              },
              plugins: { updater: { active: false } }
            }
          }

          obj.version = ver || obj.version || '0.0.0'
          obj.bundle = obj.bundle || {}
          obj.bundle.externalBin = Array.from(new Set([...(obj.bundle.externalBin || []), 'bin/server', 'bin/ffmpeg']))
          obj.bundle.macOS = obj.bundle.macOS || {}
          obj.bundle.macOS.signingIdentity = id
          obj.bundle.macOS.hardenedRuntime = !!id
          obj.build = obj.build || {}
          obj.build.frontendDist = obj.build.frontendDist || '../dist'
          fs.writeFileSync(conf, JSON.stringify(obj, null, 2))
          console.log('Version set', { tag, raw, ver, conf, id })
          NODE
          echo "DESKTOP_READY=true" >> "$GITHUB_ENV"
      - name: Bootstrap Tauri Rust skeleton if missing
        shell: bash
        run: |
          node -e "const fs=require('fs');fs.mkdirSync('desktop/tauri/src-tauri/src',{recursive:true});if(!fs.existsSync('desktop/tauri/src-tauri/Cargo.toml')){const cargo=['[package]','name = \"saynote-tauri\"','version = \"0.0.0\"','edition = \"2021\"','',[\"[dependencies]\"],'tauri = { version = \"2\", features = [] }','serde = { version = \"1\", features = [\"derive\"] }','serde_json = \"1\"','',[\"[build-dependencies]\"],'tauri-build = { version = \"2\", features = [] }','',[\"[features]\"],'default = [\"custom-protocol\"]','custom-protocol = [\"tauri/custom-protocol\"]','',[\"[profile.release]\"],'panic = \"abort\"','codegen-units = 1','lto = true',''].join('\\n');fs.writeFileSync('desktop/tauri/src-tauri/Cargo.toml',cargo)}if(!fs.existsSync('desktop/tauri/src-tauri/build.rs')){fs.writeFileSync('desktop/tauri/src-tauri/build.rs','fn main(){ tauri_build::build(); }')}if(!fs.existsSync('desktop/tauri/src-tauri/src/main.rs')){const main=['fn main() {','  tauri::Builder::default()','    .run(tauri::generate_context!())','    .expect(\"error while running tauri application\");','}',''].join('\\n');fs.writeFileSync('desktop/tauri/src-tauri/src/main.rs',main)}"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Install FFmpeg (macos)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          brew update
          brew install ffmpeg
      - name: Install FFmpeg (windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          choco install ffmpeg -y --no-progress
      - uses: dtolnay/rust-toolchain@stable
      - name: Build web and copy resources
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          cd web
          npm install
          npm run generate
          cd ..
          mkdir -p desktop/tauri/src-tauri/public desktop/tauri/dist desktop/tauri/src-tauri/icons desktop/tauri/src-tauri/data desktop/tauri/src-tauri/config
          rm -rf desktop/tauri/src-tauri/public/* || true
          rm -rf desktop/tauri/dist/* || true
          cp -r web/.output/public/. desktop/tauri/src-tauri/public/
          cp -r web/.output/public/. desktop/tauri/dist/
          cp web/public/favicon.svg desktop/tauri/src-tauri/icons/favicon.svg || true
          SRC_DB="data/noise.db"
          [ -f noise/data/noise.db ] && SRC_DB="noise/data/noise.db"
          [ -f "$SRC_DB" ] || (mkdir -p data && : > data/noise.db && SRC_DB="data/noise.db")
          cp "$SRC_DB" desktop/tauri/src-tauri/data/noise.db
          [ -d config ] && cp -r config/. desktop/tauri/src-tauri/config/ || true
      - name: Generate PNG icons
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          cd desktop/tauri
          npm install
          npm install png-to-ico --no-save
          npm install to-ico --no-save
          node scripts/gen-icons.mjs
      - name: Verify icons exist
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          ls -la desktop/tauri/src-tauri/icons || true
          need=false
          for f in icon-128.png icon-256.png icon-512.png icon.png; do
            [ -f "desktop/tauri/src-tauri/icons/$f" ] || need=true
          done
          if [ "$need" = "true" ] || [ ! -f "desktop/tauri/src-tauri/icons/icon.ico" ]; then
            echo "regenerating icons..."
            cd desktop/tauri
            node scripts/gen-icons.mjs
          fi
      - name: Ensure SQLite file exists
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          mkdir -p data
          : > data/noise.db
      - name: Build sidecar
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          bash desktop/tauri/build-sidecar.sh
      - name: Normalize sidecar binaries
        shell: bash
        if: env.DESKTOP_READY == 'true'
        env:
          BUILD_OS: ${{ matrix.os }}
        run: |
          CONF="desktop/tauri/src-tauri/tauri.conf.json"
          if [ "$BUILD_OS" = "windows-latest" ]; then
            SERVER_BIN="desktop/tauri/src-tauri/bin/server-x86_64-pc-windows-msvc.exe"
            FFMPEG_BIN="desktop/tauri/src-tauri/bin/ffmpeg-x86_64-pc-windows-msvc.exe"
          else
            ARCH="$(uname -m)"
            if [ "$ARCH" = "arm64" ]; then
              SERVER_BIN="desktop/tauri/src-tauri/bin/server-aarch64-apple-darwin"
              FFMPEG_BIN="desktop/tauri/src-tauri/bin/ffmpeg-aarch64-apple-darwin"
            else
              SERVER_BIN="desktop/tauri/src-tauri/bin/server-x86_64-apple-darwin"
              FFMPEG_BIN="desktop/tauri/src-tauri/bin/ffmpeg-x86_64-apple-darwin"
            fi
          fi

          if [ ! -f "$SERVER_BIN" ]; then
            echo "ERROR: required sidecar missing: $SERVER_BIN"
            find desktop/tauri/src-tauri/bin -maxdepth 1 -type f -print || true
            exit 1
          fi

          if [ ! -f "$FFMPEG_BIN" ]; then
            echo "ffmpeg sidecar not found, remove optional ffmpeg from externalBin"
            node -e "const fs=require('fs');const p='$CONF';const c=JSON.parse(fs.readFileSync(p,'utf8'));const b=(c.bundle=c.bundle||{});const ex=Array.isArray(b.externalBin)?b.externalBin:[];b.externalBin=ex.filter(x=>!String(x).includes('ffmpeg'));fs.writeFileSync(p,JSON.stringify(c,null,2));console.log('externalBin =>',b.externalBin);"
          fi
      - name: Smoke test desktop backend sidecar
        shell: bash
        if: env.DESKTOP_READY == 'true'
        env:
          BUILD_OS: ${{ matrix.os }}
        run: |
          set -euo pipefail
          if [ "$BUILD_OS" = "windows-latest" ]; then
            SERVER_BIN="desktop/tauri/src-tauri/bin/server-x86_64-pc-windows-msvc.exe"
          else
            ARCH="$(uname -m)"
            if [ "$ARCH" = "arm64" ]; then
              SERVER_BIN="desktop/tauri/src-tauri/bin/server-aarch64-apple-darwin"
            else
              SERVER_BIN="desktop/tauri/src-tauri/bin/server-x86_64-apple-darwin"
            fi
          fi
          [ -f "$SERVER_BIN" ] || (echo "ERROR: sidecar missing: $SERVER_BIN" && exit 1)

          SMOKE_DIR="$RUNNER_TEMP/saynote-sidecar-smoke"
          mkdir -p "$SMOKE_DIR/data" "$SMOKE_DIR/logs"
          : > "$SMOKE_DIR/data/noise.db"
          : > "$SMOKE_DIR/smoke.log"

          DB_TYPE=sqlite DB_PATH="$SMOKE_DIR/data/noise.db" APP_VERSION=0.0.0 ECHO_NOISE_VERSION=0.0.0 IMAGE_TAG=V0.0.0 "$SERVER_BIN" >"$SMOKE_DIR/smoke.log" 2>&1 &
          PID=$!
          trap 'kill "$PID" 2>/dev/null || true' EXIT

          ok=false
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:1314/api/status" >/dev/null 2>&1 || curl -fsS "http://127.0.0.1:1314/status" >/dev/null 2>&1; then
              ok=true
              break
            fi
            sleep 1
          done
          if [ "$ok" != "true" ]; then
            echo "ERROR: desktop sidecar failed to become ready"
            tail -n 120 "$SMOKE_DIR/smoke.log" || true
            exit 1
          fi
          kill "$PID" 2>/dev/null || true
      - name: Install Tauri deps
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          cd desktop/tauri
          npm install
      - name: mac codesign setup
        id: mac_codesign
        if: matrix.os == 'macos-latest'
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.MAC_SIGNING_IDENTITY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          if [ -n "$MAC_CERT_BASE64" ]; then
            echo "$MAC_CERT_BASE64" | base64 --decode > signing.p12
            security create-keychain -p "$MAC_CERT_PASSWORD" build.keychain
            security import signing.p12 -k build.keychain -P "$MAC_CERT_PASSWORD" -A
            security list-keychains -s build.keychain
            security unlock-keychain -p "$MAC_CERT_PASSWORD" build.keychain
            export MAC_SIGNING_IDENTITY="$SIGNING_IDENTITY"
          fi
          if [ -n "$APPLE_API_KEY_BASE64" ]; then
            echo "$APPLE_API_KEY_BASE64" | base64 --decode > AuthKey.p8
          fi
          if [ -n "$MAC_CERT_BASE64" ] || [ -n "$APPLE_API_KEY_BASE64" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: windows codesign setup
        id: windows_setup
        if: matrix.os == 'windows-latest'
        shell: powershell
        env:
          WIN_CERT_PFX_BASE64: ${{ secrets.WIN_CERT_PFX_BASE64 }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          if ($env:WIN_CERT_PFX_BASE64) {
            $certPath = "$env:RUNNER_TEMP/win-codesign.pfx"
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WIN_CERT_PFX_BASE64))
            "WIN_CERT_PFX_PATH=$certPath" >> $env:GITHUB_ENV
            "ready=true" >> $env:GITHUB_OUTPUT
          } else {
            "ready=false" >> $env:GITHUB_OUTPUT
          }
      - name: Build app (tauri)
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          cd desktop/tauri
          npx tauri build --verbose
      - name: Upload DMG (macos)
        if: env.DESKTOP_READY == 'true' && matrix.os == 'macos-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Searching for DMG..."
          DMG_PATH=$(find desktop/tauri/src-tauri/target -name "*.dmg" | head -n 1)
          if [ -z "$DMG_PATH" ]; then
             echo "ERROR: DMG not found. Listing target directory for debug:"
             find desktop/tauri/src-tauri/target -maxdepth 5 -not -path '*/deps/*' || true
             exit 1
          fi
          echo "Found DMG: $DMG_PATH"
          gh release upload "${{ env.RELEASE_TAG }}" "$DMG_PATH" --clobber
      - name: Upload Windows EXE
        if: env.DESKTOP_READY == 'true' && matrix.os == 'windows-latest'
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "Searching for NSIS EXE..."
          $exe = Get-ChildItem -Path "desktop/tauri/src-tauri/target" -Recurse -Filter "*.exe" | Where-Object { $_.FullName -match "nsis" } | Select-Object -First 1
          if (-not $exe) {
            Write-Host "ERROR: NSIS EXE not found. Listing target directory for debug:"
            Get-ChildItem -Path "desktop/tauri/src-tauri/target" -Recurse -Filter "*.exe" | Select-Object -First 50 | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          Write-Host ("Found EXE: " + $exe.FullName)
          gh release upload "$env:RELEASE_TAG" "$($exe.FullName)" --clobber
      - name: Upload Release (desktop placeholder)
        if: env.DESKTOP_READY != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "placeholder desktop build (signed workflow) for ${{ matrix.os }} at tag ${{ inputs.tag_name }}" > "$RUNNER_TEMP/placeholder-desktop-${{ matrix.os }}.txt"
          gh release upload "${{ env.RELEASE_TAG }}" "$RUNNER_TEMP/placeholder-desktop-${{ matrix.os }}.txt" --clobber
      - name: Sign mac app & notarize
        shell: bash
        if: matrix.os == 'macos-latest' && steps.mac_codesign.outputs.ready == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          find desktop/tauri/src-tauri/target -name '*.dmg' -print
          # Notarize using notarytool if API key is available (placeholder)
          if [ -f AuthKey.p8 ]; then
            echo "Notarization step configured via APPLE_API_KEY_ID/APPLE_API_ISSUER_ID"
          fi
      - name: Sign windows exe (signtool)
        if: matrix.os == 'windows-latest' && steps.windows_setup.outputs.ready == 'true'
        shell: powershell
        env:
          WIN_CERT_PFX_PATH: ${{ env.WIN_CERT_PFX_PATH }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          $signtool = "$Env:ProgramFiles/Windows Kits/10/bin/x64/signtool.exe"
          Get-ChildItem -Recurse "desktop/tauri/src-tauri/target" -Filter *.exe | ForEach-Object { & $signtool sign /f $env:WIN_CERT_PFX_PATH /p $env:WIN_CERT_PASSWORD /tr http://timestamp.digicert.com /td SHA256 /fd SHA256 $_.FullName }

  android:
    runs-on: ubuntu-latest
    needs: create_release
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Normalize release tag
        shell: bash
        run: |
          RAW="${{ inputs.tag_name != '' && inputs.tag_name || github.ref_name }}"
          RAW="$(echo "$RAW" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          VER="$(echo "$RAW" | sed -E 's/^[vV][[:space:]]*//; s/^[[:space:]]+|[[:space:]]+$//g')"
          if [ -z "$VER" ]; then
            echo "ERROR: invalid release tag: '$RAW'"
            exit 1
          fi
          echo "RELEASE_TAG=V$VER" >> "$GITHUB_ENV"
      - name: Check mobile directory exists
        id: chk
        run: |
          if [ -d "mobile" ] && [ -f "mobile/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Bootstrap mobile skeleton if missing
        id: bootstrap
        env:
          EXISTS: ${{ steps.chk.outputs.exists }}
        run: |
          if [ "$EXISTS" != "true" ]; then
            mkdir -p mobile
            node -e "const fs=require('fs');const pkg={name:'saynote-mobile',version:'0.1.0',private:true,scripts:{'build:web':'cd ../web && npm install && npm run generate','sync':'npx cap sync android','open':'npx cap open android','build:apk':'npm run build:web && npx cap sync android && cd android && ./gradlew assembleRelease'},devDependencies:{'@capacitor/cli':'^6.2.0','@capacitor/assets':'^3.0.5','typescript':'^5.6.3'},dependencies:{'@capacitor/core':'^6.2.0','@capacitor/android':'^6.2.0'}};fs.writeFileSync('mobile/package.json',JSON.stringify(pkg,null,2));"
            echo "MOBILE_READY=true" >> "$GITHUB_ENV"
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "MOBILE_READY=true" >> "$GITHUB_ENV"
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Resolve Android build-tools
        if: env.MOBILE_READY == 'true'
        run: |
          BT_DIR=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n1)
          echo "BT_DIR=$BT_DIR" >> "$GITHUB_ENV"
          echo "APKSIGNER=$BT_DIR/apksigner" >> "$GITHUB_ENV"
          echo "ZIPALIGN=$BT_DIR/zipalign" >> "$GITHUB_ENV"
      - name: Parse version for Android
        if: env.MOBILE_READY == 'true'
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag_name }}
          REF_TAG: ${{ github.ref_name }}
        run: |
          RAW="${INPUT_TAG:-$REF_TAG}"
          RAW="$(echo "$RAW" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          VER="$(echo "$RAW" | sed -E 's/^[vV][[:space:]]*//; s/^[[:space:]]+|[[:space:]]+$//g')"
          if [[ "$VER" =~ ^([0-9]+)(\.([0-9]+))?(\.([0-9]+))? ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[3]:-0}"
            PATCH="${BASH_REMATCH[5]:-0}"
            APP_VERSION_NAME="${MAJOR}.${MINOR}.${PATCH}"
          else
            APP_VERSION_NAME="0.0.1"
          fi
          echo "APP_VERSION_NAME=$APP_VERSION_NAME" >> "$GITHUB_ENV"
      - name: Smoke test mobile backend runtime (host)
        if: env.MOBILE_READY == 'true'
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/mobilebackend_smoke.go" <<'EOF'
          package main
          
          import (
            "fmt"
            "net/http"
            "os"
            "path/filepath"
            "time"
          
            "github.com/rcy1314/echo-noise/mobilebackend"
          )
          
          func main() {
            wd, err := os.MkdirTemp("", "mobilebackend-smoke-*")
            if err != nil {
              panic(err)
            }
            defer os.RemoveAll(wd)
            if err := os.MkdirAll(filepath.Join(wd, "data"), 0o755); err != nil {
              panic(err)
            }
            f, err := os.Create(filepath.Join(wd, "data", "noise.db"))
            if err != nil {
              panic(err)
            }
            _ = f.Close()
            if err := mobilebackend.Start(wd); err != nil {
              panic(err)
            }
            defer mobilebackend.Stop()
          
            client := &http.Client{Timeout: 2 * time.Second}
            urls := []string{
              "http://127.0.0.1:1314/api/status",
              "http://127.0.0.1:1314/status",
            }
            deadline := time.Now().Add(30 * time.Second)
            for time.Now().Before(deadline) {
              for _, u := range urls {
                resp, err := client.Get(u)
                if err == nil && resp.StatusCode >= 200 && resp.StatusCode < 500 {
                  _ = resp.Body.Close()
                  fmt.Println("mobile backend smoke ok:", u)
                  return
                }
                if resp != nil {
                  _ = resp.Body.Close()
                }
              }
              time.Sleep(1 * time.Second)
            }
            panic("mobile backend smoke failed: status endpoint not reachable")
          }
          EOF
          go run "$RUNNER_TEMP/mobilebackend_smoke.go"
      - name: Build Nuxt static
        if: env.MOBILE_READY == 'true'
        env:
          NUXT_PUBLIC_BASE_API: 'http://127.0.0.1:1314/api'
        run: |
          cd web

      - name: Build Capacitor APK
        if: env.MOBILE_READY == 'true'
        run: |
          cd mobile
          npm install
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init 说说笔记 cn.noisework.saynote --web-dir ../web/.output/public
          fi
          npx cap add android || true
          
          # Inject App Name strings.xml
          if [ -f "android/app/src/main/res/values/strings.xml" ]; then
            node -e "const fs=require('fs'),p='android/app/src/main/res/values/strings.xml';let s=fs.readFileSync(p,'utf8');s=s.replace(/<string name=\\\"app_name\\\">[\\s\\S]*?<\\/string>/,'<string name=\\\"app_name\\\">说说笔记</string>');fs.writeFileSync(p,s)"
          fi
          
          # Inject Cleartext Traffic in AndroidManifest.xml
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            node -e "const fs=require('fs'),p='android/app/src/main/AndroidManifest.xml';let s=fs.readFileSync(p,'utf8');if(!s.includes('android:usesCleartextTraffic')){s=s.replace('<application','<application android:usesCleartextTraffic=\"true\"');fs.writeFileSync(p,s);console.log('Enabled Cleartext Traffic');}"
          fi
          
          # Inject MainActivity.java to start Go backend
          mkdir -p android/app/src/main/java/cn/noisework/saynote
          cat <<EOF > android/app/src/main/java/cn/noisework/saynote/MainActivity.java
          package cn.noisework.saynote;
          
          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          import cn.noisework.saynote.go.mobilebackend.Mobilebackend;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.io.OutputStream;
          import android.util.Log;
          
          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  try {
                      String filesDir = getFilesDir().getAbsolutePath();
                      Log.d("SayNote", "Initializing Go backend in: " + filesDir);
                      
                      // Copy assets
                      copyAssets("data");
                      copyAssets("config");
                      
                      // Start Go backend
                      Mobilebackend.start(filesDir);
                      Log.d("SayNote", "Go backend started");
                  } catch (Exception e) {
                      Log.e("SayNote", "Failed to start backend", e);
                  }
              }
          
              private void copyAssets(String path) {
                  try {
                      String[] list = getAssets().list(path);
                      if (list.length > 0) {
                          // It's a directory
                          File dir = new File(getFilesDir(), path);
                          if (!dir.exists()) dir.mkdir();
                          for (String file : list) {
                              copyAssets(path + "/" + file);
                          }
                      } else {
                          // It's a file
                          File outFile = new File(getFilesDir(), path);
                          if (outFile.exists()) return; // Don't overwrite to preserve user data
                          
                          InputStream in = getAssets().open(path);
                          OutputStream out = new FileOutputStream(outFile);
                          byte[] buffer = new byte[1024];
                          int read;
                          while ((read = in.read(buffer)) != -1) {
                              out.write(buffer, 0, read);
                          }
                          in.close();
                          out.close();
                      }
                  } catch (Exception e) {
                      Log.e("SayNote", "Failed to copy asset: " + path, e);
                  }
              }
          }
          EOF
 

name: tauri-build-release-signed
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., V2.3.5)'
        required: true
        type: string
      draft:
        description: 'Create draft release'
        required: false
        type: boolean
        default: true
  push:
    tags:
      - '*'
permissions:
  contents: write
env:
  RELEASE_TAG: ${{ inputs.tag_name != '' && inputs.tag_name || github.ref_name }}
  DRAFT_RELEASE: true

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Normalize release tag
        shell: bash
        run: |
          RAW="${{ inputs.tag_name != '' && inputs.tag_name || github.ref_name }}"
          VER=$(echo "$RAW" | sed -E 's/^[vV]//')
          echo "RELEASE_TAG=V$VER" >> "$GITHUB_ENV"
      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ env.DRAFT_RELEASE }}
          tag_name: ${{ env.RELEASE_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-matrix:
    needs: create_release
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Normalize release tag
        shell: bash
        run: |
          RAW="${{ inputs.tag_name != '' && inputs.tag_name || github.ref_name }}"
          VER=$(echo "$RAW" | sed -E 's/^[vV]//')
          echo "RELEASE_TAG=V$VER" >> "$GITHUB_ENV"
      - name: Check desktop directory exists
        shell: bash
        id: chkdesk
        run: |
          if [ -d "desktop/tauri" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set app version from input tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag_name }}
          REF_TAG: ${{ github.ref_name }}
          SIGNING_IDENTITY: ${{ secrets.MAC_SIGNING_IDENTITY }}
        run: |
          node -e "const fs=require('fs'),p=require('path');const tag=(process.env.INPUT_TAG||process.env.REF_TAG||'');const ver=tag.replace(/^v/i,'').replace(/^V/i,'');const id=process.env.SIGNING_IDENTITY||null;const sdir=p.join('desktop','tauri','src-tauri');const conf=p.join(sdir,'tauri.conf.json');fs.mkdirSync(sdir,{recursive:true});let obj;if(fs.existsSync(conf)){try{obj=JSON.parse(fs.readFileSync(conf,'utf8'))}catch(e){obj=null}}if(!obj){obj={\"$schema\":\"https://schema.tauri.app/config/2\",productName:'说说笔记',version:ver||'0.0.0',identifier:'cn.noisework.saynote',build:{devUrl:'http://localhost:1314',frontendDist:'../dist'},app:{windows:[{title:'说说笔记',width:1280,height:800}]},bundle:{active:true,targets:['dmg','nsis'],icon:['icons/icon.ico','icons/icon-128.png','icons/icon-256.png','icons/icon-512.png'],resources:['icons/favicon.svg','public','data/noise.db','config'],externalBin:['bin/server'],windows:{nsis:{}},macOS:{hardenedRuntime:!!id,minimumSystemVersion:'10.13',signingIdentity:id}},plugins:{updater:{active:false}}}};obj.version=ver||obj.version||'0.0.0';obj.bundle=obj.bundle||{};obj.bundle.macOS=obj.bundle.macOS||{};obj.bundle.macOS.signingIdentity=id;obj.bundle.macOS.hardenedRuntime=!!id;if(!obj.build)obj.build={};obj.build.frontendDist=obj.build.frontendDist||'../dist';fs.writeFileSync(conf,JSON.stringify(obj,null,2));console.log('Version set',{tag,ver,conf,id});"
          echo "DESKTOP_READY=true" >> "$GITHUB_ENV"
      - name: Bootstrap Tauri Rust skeleton if missing
        shell: bash
        run: |
          node -e "const fs=require('fs');fs.mkdirSync('desktop/tauri/src-tauri/src',{recursive:true});if(!fs.existsSync('desktop/tauri/src-tauri/Cargo.toml')){const cargo=['[package]','name = \"saynote-tauri\"','version = \"0.0.0\"','edition = \"2021\"','',[\"[dependencies]\"],'tauri = { version = \"2\", features = [] }','serde = { version = \"1\", features = [\"derive\"] }','serde_json = \"1\"','',[\"[build-dependencies]\"],'tauri-build = { version = \"2\", features = [] }','',[\"[features]\"],'default = [\"custom-protocol\"]','custom-protocol = [\"tauri/custom-protocol\"]','',[\"[profile.release]\"],'panic = \"abort\"','codegen-units = 1','lto = true',''].join('\\n');fs.writeFileSync('desktop/tauri/src-tauri/Cargo.toml',cargo)}if(!fs.existsSync('desktop/tauri/src-tauri/build.rs')){fs.writeFileSync('desktop/tauri/src-tauri/build.rs','fn main(){ tauri_build::build(); }')}if(!fs.existsSync('desktop/tauri/src-tauri/src/main.rs')){const main=['fn main() {','  tauri::Builder::default()','    .run(tauri::generate_context!())','    .expect(\"error while running tauri application\");','}',''].join('\\n');fs.writeFileSync('desktop/tauri/src-tauri/src/main.rs',main)}"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install Linux dependencies (skip on non-linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-0 libayatana-appindicator3-1 librsvg2-dev patchelf
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Build web and copy resources
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          cd web
          npm install
          npm run generate
          cd ..
          mkdir -p desktop/tauri/src-tauri/public desktop/tauri/dist desktop/tauri/src-tauri/icons desktop/tauri/src-tauri/data desktop/tauri/src-tauri/config
          rm -rf desktop/tauri/src-tauri/public/* || true
          rm -rf desktop/tauri/dist/* || true
          cp -r web/.output/public/. desktop/tauri/src-tauri/public/
          cp -r web/.output/public/. desktop/tauri/dist/
          cp web/public/favicon.svg desktop/tauri/src-tauri/icons/favicon.svg || true
          SRC_DB="data/noise.db"
          [ -f noise/data/noise.db ] && SRC_DB="noise/data/noise.db"
          [ -f "$SRC_DB" ] || (mkdir -p data && : > data/noise.db && SRC_DB="data/noise.db")
          cp "$SRC_DB" desktop/tauri/src-tauri/data/noise.db
          [ -d config ] && cp -r config/. desktop/tauri/src-tauri/config/ || true
      - name: Generate PNG icons
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          cd desktop/tauri
          npm install
          npm install png-to-ico --no-save
          npm install to-ico --no-save
          node scripts/gen-icons.mjs
      - name: Verify icons exist
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          ls -la desktop/tauri/src-tauri/icons || true
          need=false
          for f in icon-128.png icon-256.png icon-512.png icon.png; do
            [ -f "desktop/tauri/src-tauri/icons/$f" ] || need=true
          done
          if [ "$need" = "true" ] || [ ! -f "desktop/tauri/src-tauri/icons/icon.ico" ]; then
            echo "regenerating icons..."
            cd desktop/tauri
            node scripts/gen-icons.mjs
          fi
      - name: Ensure SQLite file exists
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          mkdir -p data
          : > data/noise.db
      - name: Build sidecar
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          bash desktop/tauri/build-sidecar.sh
      - name: Install Tauri deps
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          cd desktop/tauri
          npm install
      - name: mac codesign setup
        id: mac_codesign
        if: matrix.os == 'macos-latest'
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.MAC_SIGNING_IDENTITY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          if [ -n "$MAC_CERT_BASE64" ]; then
            echo "$MAC_CERT_BASE64" | base64 --decode > signing.p12
            security create-keychain -p "$MAC_CERT_PASSWORD" build.keychain
            security import signing.p12 -k build.keychain -P "$MAC_CERT_PASSWORD" -A
            security list-keychains -s build.keychain
            security unlock-keychain -p "$MAC_CERT_PASSWORD" build.keychain
            export MAC_SIGNING_IDENTITY="$SIGNING_IDENTITY"
          fi
          if [ -n "$APPLE_API_KEY_BASE64" ]; then
            echo "$APPLE_API_KEY_BASE64" | base64 --decode > AuthKey.p8
          fi
          if [ -n "$MAC_CERT_BASE64" ] || [ -n "$APPLE_API_KEY_BASE64" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: windows codesign setup
        id: windows_setup
        if: matrix.os == 'windows-latest'
        shell: powershell
        env:
          WIN_CERT_PFX_BASE64: ${{ secrets.WIN_CERT_PFX_BASE64 }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          if ($env:WIN_CERT_PFX_BASE64) {
            $certPath = "$env:RUNNER_TEMP/win-codesign.pfx"
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WIN_CERT_PFX_BASE64))
            "WIN_CERT_PFX_PATH=$certPath" >> $env:GITHUB_ENV
            "ready=true" >> $env:GITHUB_OUTPUT
          } else {
            "ready=false" >> $env:GITHUB_OUTPUT
          }
      - name: Build app (tauri)
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          cd desktop/tauri
          npx @tauri-apps/cli@latest build --verbose
      - name: Upload DMG (macos)
        if: env.DESKTOP_READY == 'true' && matrix.os == 'macos-latest'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.RELEASE_TAG }}
          file: desktop/tauri/src-tauri/target/**/release/bundle/dmg/*.dmg
          file_glob: true
          overwrite: true
          draft: ${{ env.DRAFT_RELEASE }}
      - name: Upload Windows EXE
        if: env.DESKTOP_READY == 'true' && matrix.os == 'windows-latest'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.RELEASE_TAG }}
          file: desktop/tauri/src-tauri/target/**/release/bundle/nsis/*.exe
          file_glob: true
          overwrite: true
          draft: ${{ env.DRAFT_RELEASE }}
      - name: Upload Release (desktop placeholder)
        if: env.DESKTOP_READY != 'true'
        run: |
          echo "placeholder desktop build (signed workflow) for ${{ matrix.os }} at tag ${{ inputs.tag_name }}" > "$RUNNER_TEMP/placeholder-desktop-${{ matrix.os }}.txt"
        shell: bash
      - name: Upload placeholder file (desktop)
        if: env.DESKTOP_READY != 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ env.DRAFT_RELEASE }}
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ${{ runner.temp }}/placeholder-desktop-${{ matrix.os }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign mac app & notarize
        shell: bash
        if: matrix.os == 'macos-latest' && steps.mac_codesign.outputs.ready == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          find src-tauri/target/**/release/bundle/dmg -name '*.dmg' -print
          # Notarize using notarytool if API key is available (placeholder)
          if [ -f AuthKey.p8 ]; then
            echo "Notarization step configured via APPLE_API_KEY_ID/APPLE_API_ISSUER_ID"
          fi
      - name: Sign windows exe (signtool)
        if: matrix.os == 'windows-latest' && steps.windows_setup.outputs.ready == 'true'
        shell: powershell
        env:
          WIN_CERT_PFX_PATH: ${{ env.WIN_CERT_PFX_PATH }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          $signtool = "$Env:ProgramFiles/Windows Kits/10/bin/x64/signtool.exe"
          Get-ChildItem -Recurse "desktop/tauri/src-tauri/target" -Filter *.exe | ForEach-Object { & $signtool sign /f $env:WIN_CERT_PFX_PATH /p $env:WIN_CERT_PASSWORD /tr http://timestamp.digicert.com /td SHA256 /fd SHA256 $_.FullName }

  android:
    runs-on: ubuntu-latest
    needs: build-matrix
    steps:
      - uses: actions/checkout@v4
      - name: Normalize release tag
        shell: bash
        run: |
          RAW="${{ inputs.tag_name != '' && inputs.tag_name || github.ref_name }}"
          VER=$(echo "$RAW" | sed -E 's/^[vV]//')
          echo "RELEASE_TAG=V$VER" >> "$GITHUB_ENV"
      - name: Check mobile directory exists
        id: chk
        run: |
          if [ -d "mobile" ] && [ -f "mobile/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Bootstrap mobile skeleton if missing
        id: bootstrap
        env:
          EXISTS: ${{ steps.chk.outputs.exists }}
        run: |
          if [ "$EXISTS" != "true" ]; then
            mkdir -p mobile
            node -e "const fs=require('fs');const pkg={name:'saynote-mobile',version:'0.1.0',private:true,scripts:{'build:web':'cd ../web && npm install && npm run generate','sync':'npx cap sync android','open':'npx cap open android','build:apk':'npm run build:web && npx cap sync android && cd android && ./gradlew assembleRelease'},devDependencies:{'@capacitor/cli':'^6.2.0','typescript':'^5.6.3'},dependencies:{'@capacitor/core':'^6.2.0','@capacitor/android':'^6.2.0'}};fs.writeFileSync('mobile/package.json',JSON.stringify(pkg,null,2));"
            echo "MOBILE_READY=true" >> "$GITHUB_ENV"
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "MOBILE_READY=true" >> "$GITHUB_ENV"
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Resolve Android build-tools
        if: env.MOBILE_READY == 'true'
        run: |
          BT_DIR=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n1)
          echo "BT_DIR=$BT_DIR" >> "$GITHUB_ENV"
          echo "APKSIGNER=$BT_DIR/apksigner" >> "$GITHUB_ENV"
          echo "ZIPALIGN=$BT_DIR/zipalign" >> "$GITHUB_ENV"
      - name: Parse version for Android
        if: env.MOBILE_READY == 'true'
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag_name }}
          REF_TAG: ${{ github.ref_name }}
        run: |
          RAW="${INPUT_TAG:-$REF_TAG}"
          VER=$(echo "$RAW" | sed -E 's/^[vV]//')
          echo "APP_VERSION_NAME=$VER" >> "$GITHUB_ENV"
      - name: Build Nuxt static
        if: env.MOBILE_READY == 'true'
        run: |
          cd web
          npm install
          npm run generate
      - name: Ensure SQLite file exists
        if: env.MOBILE_READY == 'true'
        run: |
          mkdir -p data
          : > data/noise.db
      - name: Build Capacitor APK
        if: env.MOBILE_READY == 'true'
        run: |
          cd mobile
          npm install
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init 说说笔记 cn.noisework.saynote --web-dir ../web/.output/public
          fi
          npx cap add android || true
          if [ -f "android/app/src/main/res/values/strings.xml" ]; then
            node -e "const fs=require('fs'),p='android/app/src/main/res/values/strings.xml';let s=fs.readFileSync(p,'utf8');s=s.replace(/<string name=\\\"app_name\\\">[\\s\\S]*?<\\/string>/,'<string name=\\\"app_name\\\">说说笔记</string>');fs.writeFileSync(p,s)"
          fi
          if [ -f "android/app/build.gradle" ]; then
            node -e "const fs=require('fs'),p='android/app/build.gradle';let s=fs.readFileSync(p,'utf8');const ver=process.env.APP_VERSION_NAME||'0.0.0';s=s.replace(/versionName\s+\"[^\"]*\"/,'versionName \""+ver+"\"');fs.writeFileSync(p,s)"
          fi
          bash ../packaging/android/setup_backend.sh
          npm install --no-save @capacitor/assets
          npx @capacitor/assets generate --android --iconSource ../web/public/android-chrome-512x512.png --splashSource ../web/public/apple-touch-icon.png || true
          mkdir -p android/app/src/main/assets/data android/app/src/main/assets/config android/app/src/main/assets/public/data android/app/src/main/assets/public/config
          SRC_DB="../data/noise.db"
          [ -f ../noise/data/noise.db ] && SRC_DB="../noise/data/noise.db"
          [ -f "$SRC_DB" ] || (echo "WARN: $SRC_DB not found, creating empty DB"; mkdir -p ../data; : > ../data/noise.db; SRC_DB="../data/noise.db")
          cp "$SRC_DB" android/app/src/main/assets/data/noise.db
          cp "$SRC_DB" android/app/src/main/assets/public/data/noise.db
          [ -d ../config ] && cp -r ../config/. android/app/src/main/assets/config/ || true
          [ -d ../config ] && cp -r ../config/. android/app/src/main/assets/public/config/ || true
          npx cap sync android
          [ -f "android/app/src/main/assets/public/index.html" ] || (echo "ERROR: web assets missing after sync" && find android/app/src/main/assets -maxdepth 2 -type f | sed -n '1,100p' && exit 1)
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          APK_CANDIDATE=$(ls app/build/outputs/apk/release/app-release.apk 2>/dev/null || true)
          if [ -z "$APK_CANDIDATE" ]; then
            APK_CANDIDATE=$(ls app/build/outputs/apk/release/*.apk | grep -v unsigned | head -n1)
          fi
          echo "APK_PATH=$APK_CANDIDATE" >> "$GITHUB_ENV"
      - name: Zipalign APK
        if: env.MOBILE_READY == 'true'
        run: |
          export APK_PATH="${APK_PATH:-$(ls mobile/android/app/build/outputs/apk/release/*.apk | grep -v unsigned | head -n1)}"
          export ALIGNED_APK="${APK_PATH%.apk}-aligned.apk"
          "$ZIPALIGN" -p -f 4 "$APK_PATH" "$ALIGNED_APK"
          mv "$ALIGNED_APK" "$APK_PATH"
      - name: Sign APK
        if: env.MOBILE_READY == 'true' && env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_ALIAS_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
          ANDROID_KEYSTORE_TYPE: ${{ secrets.ANDROID_KEYSTORE_TYPE }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > keystore.jks
          export APK_PATH="${APK_PATH:-$(ls mobile/android/app/build/outputs/apk/release/*.apk | grep -v unsigned | head -n1)}"
          KS_TYPE_ARG=""
          if [ -n "$ANDROID_KEYSTORE_TYPE" ]; then
            KS_TYPE_ARG="--ks-type $ANDROID_KEYSTORE_TYPE"
          fi
          "$APKSIGNER" sign $KS_TYPE_ARG --ks keystore.jks --ks-key-alias "$ANDROID_KEY_ALIAS" --ks-pass pass:"$ANDROID_KEYSTORE_PASSWORD" --key-pass pass:"$ANDROID_KEY_ALIAS_PASSWORD" "$APK_PATH"
          NEW_NAME="$(dirname "$APK_PATH")/saynote-${APP_VERSION_NAME:-0.0.0}.apk"
          cp "$APK_PATH" "$NEW_NAME"
          echo "FINAL_APK=$NEW_NAME" >> "$GITHUB_ENV"
      - name: Fallback sign APK (ephemeral keystore)
        if: env.MOBILE_READY == 'true' && env.ANDROID_KEYSTORE_BASE64 == ''
        run: |
          export APK_PATH="${APK_PATH:-$(ls mobile/android/app/build/outputs/apk/release/*.apk | grep -v unsigned | head -n1)}"
          keytool -genkeypair -keystore temp-release.jks -storepass android -alias temp -keypass android -dname "CN=CI Noise,O=Noise,C=CN" -keyalg RSA -keysize 2048 -validity 36500
          "$APKSIGNER" sign --ks temp-release.jks --ks-key-alias temp --ks-pass pass:android --key-pass pass:android "$APK_PATH"
          "$APKSIGNER" verify --verbose "$APK_PATH"
          NEW_NAME="$(dirname "$APK_PATH")/saynote-${APP_VERSION_NAME:-0.0.0}.apk"
          cp "$APK_PATH" "$NEW_NAME"
          echo "FINAL_APK=$NEW_NAME" >> "$GITHUB_ENV"
      - name: Verify APK signature
        if: env.MOBILE_READY == 'true'
        run: |
          export FINAL_APK="${FINAL_APK:-$(ls mobile/android/app/build/outputs/apk/release/saynote-*.apk | head -n1)}"
          "$APKSIGNER" verify --verbose "$FINAL_APK"
      - name: Upload Release (apk)
        if: env.MOBILE_READY == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ env.DRAFT_RELEASE }}
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ${{ env.FINAL_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Release (apk placeholder)
        if: env.MOBILE_READY != 'true'
        run: |
          echo "placeholder android apk at tag ${{ inputs.tag_name }}" > "$RUNNER_TEMP/placeholder-android.txt"
        shell: bash
      - name: Upload placeholder file (apk)
        if: env.MOBILE_READY != 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ env.DRAFT_RELEASE }}
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ${{ runner.temp }}/placeholder-android.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

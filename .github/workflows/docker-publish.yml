name: Build MCP Docker Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mcp-image:
    name: Build and publish final-mcp image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/echo-noise"
          short_sha="${GITHUB_SHA::12}"

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "version=${short_sha}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${image}:latest-mcp"
            echo "${image}:sha-${short_sha}-mcp"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU binfmt
        shell: bash
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Set up Docker Buildx
        shell: bash
        run: |
          docker buildx create --name echo-noise-builder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Log in to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push final-mcp image
        shell: bash
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --target final-mcp \
            --build-arg VERSION=${{ steps.meta.outputs.version }} \
            --tag ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/echo-noise:latest-mcp \
            --tag ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/echo-noise:sha-${{ steps.meta.outputs.short_sha }}-mcp \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            .

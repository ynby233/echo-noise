name: tauri-build-and-release
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., V2.3.5)'
        required: true
        type: string
      draft:
        description: 'Create draft release'
        required: false
        type: boolean
        default: true
permissions:
  contents: write

jobs:
  tauri:
    strategy:
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Check desktop directory exists
        shell: bash
        id: chkdesk
        run: |
          if [ -d "desktop/tauri" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set app version from input tag
        shell: bash
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          node -e "const fs=require('fs'),p=require('path');const tag=process.env.TAG_NAME||'';const ver=tag.replace(/^v/i,'').replace(/^V/i,'');const dir=p.join('desktop','tauri');const sdir=p.join(dir,'src-tauri');const conf=p.join(sdir,'tauri.conf.json');const pkg=p.join(dir,'package.json');fs.mkdirSync(sdir,{recursive:true});const basePkg={name:'saynote-tauri',version:tag||'V0.0.0',private:true};fs.writeFileSync(pkg,JSON.stringify(basePkg,null,2));const cfg={productName:'说说笔记',version:ver||'0.0.0',identifier:'cn.noisework.saynote',build:{frontendDist:'../dist'},app:{windows:[{title:'说说笔记',width:1280,height:800}]},bundle:{active:true,targets:'all',resources:['public','data/noise.db','config']}};fs.writeFileSync(conf,JSON.stringify(cfg,null,2));console.log('Version set',{tag,ver});"
          echo "DESKTOP_READY=true" >> "$GITHUB_ENV"
      - name: Bootstrap Tauri Rust skeleton if missing
        shell: bash
        run: |
          node -e "const fs=require('fs');fs.mkdirSync('desktop/tauri/src-tauri/src',{recursive:true});if(!fs.existsSync('desktop/tauri/src-tauri/Cargo.toml')){const cargo=['[package]','name = \"saynote-tauri\"','version = \"0.0.0\"','edition = \"2021\"','',[\"[dependencies]\"],'tauri = { version = \"2\", features = [] }','serde = { version = \"1\", features = [\"derive\"] }','serde_json = \"1\"','',[\"[build-dependencies]\"],'tauri-build = { version = \"2\", features = [] }','',[\"[features]\"],'default = [\"custom-protocol\"]','custom-protocol = [\"tauri/custom-protocol\"]','',[\"[profile.release]\"],'panic = \"abort\"','codegen-units = 1','lto = true',''].join('\\n');fs.writeFileSync('desktop/tauri/src-tauri/Cargo.toml',cargo)}if(!fs.existsSync('desktop/tauri/src-tauri/src/main.rs')){const main=['fn main() {','  tauri::Builder::default()','    .run(tauri::generate_context!())','    .expect(\"error while running tauri application\");','}',''].join('\\n');fs.writeFileSync('desktop/tauri/src-tauri/src/main.rs',main)}"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Ensure SQLite file exists
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          mkdir -p data
          : > data/noise.db
      - name: Build web and copy resources
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          cd web
          npm install
          npm run generate
          cd ..
          mkdir -p desktop/tauri/src-tauri/public desktop/tauri/dist desktop/tauri/src-tauri/icons desktop/tauri/src-tauri/data desktop/tauri/src-tauri/config
          rm -rf desktop/tauri/src-tauri/public/* || true
          rm -rf desktop/tauri/dist/* || true
          cp -r web/.output/public/. desktop/tauri/src-tauri/public/
          cp -r web/.output/public/. desktop/tauri/dist/
          cp web/public/favicon.svg desktop/tauri/src-tauri/icons/favicon.svg || true
          [ -f data/noise.db ] || (mkdir -p data && : > data/noise.db)
          cp data/noise.db desktop/tauri/src-tauri/data/noise.db
          [ -d config ] && cp -r config/. desktop/tauri/src-tauri/config/ || true
      - name: Build sidecar
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          if [ -f desktop/tauri/build-sidecar.sh ]; then bash desktop/tauri/build-sidecar.sh; else echo "skip sidecar (no script)"; fi
      - name: Build Tauri app
        shell: bash
        if: env.DESKTOP_READY == 'true'
        run: |
          cd desktop/tauri
          npx @tauri-apps/cli@latest build
      - name: Upload artifacts (desktop real)
        if: env.DESKTOP_READY == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ inputs.draft }}
          tag_name: ${{ inputs.tag_name }}
          files: |
            desktop/tauri/src-tauri/target/**/release/bundle/**/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts (desktop placeholder)
        if: env.DESKTOP_READY != 'true'
        run: |
          echo "placeholder desktop build for ${{ matrix.platform }} at tag ${{ inputs.tag_name }}" > "$RUNNER_TEMP/placeholder-desktop-${{ matrix.platform }}.txt"
        shell: bash
      - name: Upload placeholder file
        if: env.DESKTOP_READY != 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ inputs.draft }}
          tag_name: ${{ inputs.tag_name }}
          files: |
            ${{ runner.temp }}/placeholder-desktop-${{ matrix.platform }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>说说笔记</title>
  <link rel="stylesheet" href="css/popup.css">
  <link rel="stylesheet" href="css/markdown.css">
  <link rel="stylesheet" href="css/easymde.min.css">
</head>
<body>
  <div class="container">
    <header class="topbar">
      <h1 class="brand">
        <img src="icons/note.svg" alt="笔记" class="title-icon">
        说说笔记
      </h1>
      <button id="settingsBtn" class="icon-btn" title="设置">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><path fill="none" d="M0 0h24v24H0z"/><path d="M9.954 2.21a9.99 9.99 0 0 1 4.091-.002A3.993 3.993 0 0 0 16 5.07a3.993 3.993 0 0 0 3.457.261A9.99 9.99 0 0 1 21.5 8.876 3.993 3.993 0 0 0 20 12c0 1.264.586 2.391 1.502 3.124a10.043 10.043 0 0 1-2.046 3.543 3.993 3.993 0 0 0-3.456.261 3.993 3.993 0 0 0-1.954 2.86 9.99 9.99 0 0 1-4.091.004A3.993 3.993 0 0 0 8 18.927a3.993 3.993 0 0 0-3.457-.26A9.99 9.99 0 0 1 2.5 15.121 3.993 3.993 0 0 0 4 12c0-1.264-.586-2.391-1.502-3.124a10.043 10.043 0 0 1 2.046-3.543A3.993 3.993 0 0 0 8 5.072a3.993 3.993 0 0 0 1.954-2.86zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" fill="currentColor"/></svg>
      </button>
    </header>

    <section id="siteInfoCard" class="card site-info-card hidden">
      <div class="section-head">
        <h2>网站信息</h2>
        <span id="siteInfoBadge" class="badge">未识别</span>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label for="pageTitle">标题</label>
          <input id="pageTitle" type="text" placeholder="网页标题">
        </div>
        <div class="form-group">
          <label for="pageUrl">网址</label>
          <input id="pageUrl" type="text" placeholder="https://">
        </div>
      </div>
      <div class="form-group">
        <label for="pageDescription">描述</label>
        <textarea id="pageDescription" rows="2" placeholder="网页描述"></textarea>
      </div>
      <div class="inline-actions">
        <button id="insertSiteInfoBtn" class="btn ghost-btn">插入到正文</button>
        <button id="hideSiteInfoBtn" class="btn text-btn">收起</button>
      </div>
    </section>

    <div id="editorContainer" class="editor-container card">
      <textarea id="editor"></textarea>
      <div class="toolbar">
        <div class="toolbar-left">
          <button id="tagBtn" class="toolbar-btn" title="添加标签">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><path fill="none" d="M0 0h24v24H0z"/><path d="M10.9 2.1l9.899 1.415 1.414 9.9-9.192 9.192a1 1 0 0 1-1.414 0l-9.9-9.9a1 1 0 0 1 0-1.414L10.9 2.1zm.707 2.122L3.828 12l8.486 8.485 7.778-7.778-1.06-7.425-7.425-1.06zm2.12 6.364a2 2 0 1 1 2.83-2.829 2 2 0 0 1-2.83 2.829z" fill="currentColor"/></svg>
          </button>
          <button id="linkBtn" class="toolbar-btn" title="添加链接">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><path fill="none" d="M0 0h24v24H0z"/><path d="M18.364 15.536L16.95 14.12l1.414-1.414a5 5 0 1 0-7.071-7.071L9.879 7.05 8.464 5.636 9.88 4.222a7 7 0 0 1 9.9 9.9l-1.415 1.414zm-2.828 2.828l-1.415 1.414a7 7 0 0 1-9.9-9.9l1.415-1.414L7.05 9.88l-1.414 1.414a5 5 0 1 0 7.071 7.071l1.414-1.414 1.415 1.414zm-.708-10.607l1.415 1.415-7.071 7.07-1.415-1.414 7.071-7.07z" fill="currentColor"/></svg>
          </button>
          <button id="imageBtn" class="toolbar-btn" title="添加图片">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><path fill="none" d="M0 0h24v24H0z"/><path d="M4.828 21l-.02.02-.021-.02H2.992A.993.993 0 0 1 2 20.007V3.993A1 1 0 0 1 2.992 3h18.016c.548 0 .992.445.992.993v16.014a1 1 0 0 1-.992.993H4.828zM20 15V5H4v14L14 9l6 6zm0 2.828l-6-6L6.828 19H20v-1.172zM8 11a2 2 0 1 1 0-4 2 2 0 0 1 0 4z" fill="currentColor"/></svg>
          </button>
          <button id="clearBtn" class="toolbar-btn danger-btn" title="一键清空">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><path fill="none" d="M0 0h24v24H0z"/><path d="M17 6h5v2h-2v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V8H2V6h5V3a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v3zm1 2H6v12h12zM9 11h2v8H9zm4 0h2v8h-2zM9 4v2h6V4z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="toolbar-right">
          <label class="notify-toggle" title="是否触发站内已启用的推送渠道">
            <input id="notifyToggle" type="checkbox">
            <span class="notify-toggle-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16"><path fill="none" d="M0 0h24v24H0z"/><path d="M19 17H5v-2l2-2v-3a5 5 0 0 1 4-4.9V4a1 1 0 1 1 2 0v1.1A5 5 0 0 1 17 10v3l2 2v2zm-7 4a3 3 0 0 1-2.995-2.824L9 18h6a3 3 0 0 1-3 3z" fill="currentColor"/></svg>
            </span>
            <span class="notify-switch" aria-hidden="true"></span>
          </label>
          <button id="sendBtn" class="send-btn">发送</button>
        </div>
      </div>
    </div>

    <div id="resultContainer" class="result-container hidden" aria-live="polite">
      <div class="result-header">
        <span id="resultMessage"></span>
        <button id="closeResultBtn" class="icon-btn close-btn" title="关闭">&times;</button>
      </div>
      <div id="previewContent" class="preview-content hidden"></div>
      <a id="viewLink" class="view-link hidden" href="#" target="_blank">前往查看</a>
    </div>

    <div id="settingsModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>扩展设置</h3>
          <button id="closeSettingsBtn" class="icon-btn close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="siteUrl">站点地址</label>
            <input type="text" id="siteUrl" placeholder="例如: https://note.noisework.cn">
            <small class="form-help">用于发送内容的目标站点根地址。</small>
          </div>
          <div class="form-group">
            <label for="apiToken">API Token</label>
            <input type="text" id="apiToken" placeholder="输入你的API Token">
            <small class="form-help">建议填写，能避免匿名接口不可用导致失败。</small>
          </div>
        </div>
        <div class="modal-footer">
          <button id="cancelSettingsBtn" class="btn ghost-btn">取消</button>
          <button id="saveSettingsBtn" class="btn primary-btn">保存</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden" aria-live="polite"></div>
  </div>

  <script src="js/easymde.min.js"></script>
  <script src="js/marked.min.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
